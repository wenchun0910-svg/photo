<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動相簿集錦</title>
    <!-- 引入 Tailwind CSS 進行快速排版與響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 自訂捲軸與平滑過渡效果 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .transition-all { transition: all 0.3s ease; }
        .image-container { overflow: hidden; }
        .image-container img { transition: transform 0.5s ease; }
        .image-container:hover img { transform: scale(1.05); }
        
        /* 隱藏預設捲軸，讓畫面更簡潔 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- 導覽列 -->
    <nav class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <i class="ph-fill ph-image text-blue-600 text-3xl"></i>
                    <span class="font-bold text-xl text-gray-900">活動相簿集錦</span>
                </div>
                <div>
                    <!-- 登入/登出按鈕 -->
                    <button id="authBtn" onclick="toggleAuth()" class="flex items-center space-x-1 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">
                        <i class="ph ph-user text-lg" id="authIcon"></i>
                        <span id="authText">管理員登入</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- 控制列 (搜尋 & 管理員工具) -->
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            
            <!-- 搜尋框 -->
            <div class="relative w-full md:w-96 shrink-0">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="ph ph-magnifying-glass text-gray-400 text-lg"></i>
                </div>
                <input type="text" id="searchInput" oninput="handleSearch()" class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 sm:text-sm transition-all shadow-sm" placeholder="輸入關鍵字搜尋相簿...">
            </div>

            <!-- 管理員工具列 (登入後顯示) -->
            <div id="adminToolbar" class="hidden flex items-center bg-blue-50 p-2 rounded-lg border border-blue-100 w-full md:w-auto overflow-x-auto">
                <span class="text-blue-800 font-medium mx-3 hidden md:inline whitespace-nowrap">系統管理員</span>
                <div class="flex space-x-2 w-full md:w-auto">
                    <button onclick="openAccountListModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md shadow-sm flex items-center justify-center flex-1 md:flex-none space-x-2 transition-colors">
                        <i class="ph ph-users text-lg"></i>
                        <span class="whitespace-nowrap">管理帳號</span>
                    </button>
                    <button onclick="openPhotoModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md shadow-sm flex items-center justify-center flex-1 md:flex-none space-x-2 transition-colors">
                        <i class="ph ph-plus-circle text-lg"></i>
                        <span class="whitespace-nowrap">新增相簿</span>
                    </button>
                </div>
            </div>
            
        </div>

        <!-- 相簿網格 -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- 相片卡片將由 JavaScript 動態生成 -->
        </div>

        <!-- 載入中動畫 -->
        <div id="loadingIndicator" class="hidden flex justify-center items-center py-12">
            <i class="ph ph-spinner animate-spin text-4xl text-blue-500"></i>
        </div>
        
        <!-- 無資料提示 -->
        <div id="emptyState" class="hidden text-center py-20 text-gray-500">
            <i class="ph ph-images text-6xl mb-4 text-gray-300"></i>
            <p class="text-lg" id="emptyStateText">目前還沒有任何照片喔！</p>
        </div>

        <!-- 分頁控制區 -->
        <div id="paginationContainer" class="mt-10 flex justify-center hidden">
            <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination" id="paginationControls">
                <!-- 按鈕由 JS 動態產生 -->
            </nav>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-6 mt-auto">
        <div class="text-center text-sm text-gray-500">
            &copy; 2026 活動相簿集錦系統. All rights reserved.
        </div>
    </footer>

    <!-- ================= 互動視窗 (Modals) ================= -->

    <!-- 1. 登入視窗 -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-all">
            <div class="text-center mb-6">
                <i class="ph-fill ph-lock-key text-4xl text-blue-600 mb-2"></i>
                <h2 class="text-2xl font-bold text-gray-800">管理員登入</h2>
                <p class="text-sm text-gray-500 mt-1">若尚無帳號，預設帳號為 admin / admin123</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                    <input type="text" id="loginUsername" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="請輸入帳號" onkeypress="if(event.key === 'Enter') document.getElementById('loginPassword').focus()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="請輸入密碼" onkeypress="if(event.key === 'Enter') checkLogin()">
                </div>
                <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition-colors flex justify-center items-center">
                    <span id="loginBtnText">登入</span>
                    <i id="loginSpinner" class="ph ph-spinner animate-spin text-xl ml-2 hidden"></i>
                </button>
                <button onclick="closeModal('loginModal')" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 rounded-md transition-colors mt-2">取消</button>
            </div>
        </div>
    </div>

    <!-- 2. 新增/編輯照片視窗 -->
    <div id="photoModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="bg-white rounded-xl shadow-2xl p-6 sm:p-8 max-w-lg w-full mx-4 my-auto relative">
            <button onclick="closeModal('photoModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="ph ph-x text-2xl"></i>
            </button>
            <h2 id="photoModalTitle" class="text-2xl font-bold text-gray-800 mb-6">新增照片</h2>
            
            <form id="photoForm" onsubmit="savePhoto(event)" class="space-y-5">
                <input type="hidden" id="photoId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">活動名稱 / 標題 <span class="text-red-500">*</span></label>
                    <input type="text" id="photoTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-blue-900 mb-1">1. 相簿或資料夾連結 (點擊後前往的網址) <span class="text-red-500">*</span></label>
                        <input type="url" id="photoUrl" required placeholder="使用者點擊卡片後要開啟的連結" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-blue-900 mb-1">2. 封面縮圖圖片連結 (指定相簿內的一張照片) <span class="text-red-500">*</span></label>
                        <input type="url" id="thumbnailUrl" required placeholder="https://drive.google.com/file/d/..." class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <p class="text-xs text-blue-700 mt-1">請貼上相簿中「單張照片」的共用連結，系統會以此作為顯示的封面縮圖。</p>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">活動日期 <span class="text-red-500">*</span></label>
                    <input type="date" id="photoDate" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">說明描述</label>
                    <textarea id="photoDesc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                </div>
                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" onclick="closeModal('photoModal')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md transition-colors">取消</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md transition-colors flex items-center">
                        <i class="ph ph-floppy-disk mr-2"></i> 儲存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 3. 確認刪除視窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 text-center">
            <i class="ph-fill ph-warning-circle text-5xl text-red-500 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800 mb-2">確定要刪除嗎？</h2>
            <p class="text-gray-600 mb-6">刪除後將無法復原此紀錄。</p>
            <input type="hidden" id="deleteId">
            <input type="hidden" id="deleteType" value="photo">
            <div class="flex justify-center space-x-3">
                <button onclick="closeModal('deleteModal')" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md transition-colors">取消</button>
                <button onclick="confirmDelete()" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-md transition-colors">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 5. 帳號管理列表視窗 -->
    <div id="accountListModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="bg-white rounded-xl shadow-2xl p-6 sm:p-8 max-w-lg w-full mx-4 my-auto relative">
            <button onclick="closeModal('accountListModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="ph ph-x text-2xl"></i>
            </button>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <i class="ph-fill ph-users text-indigo-600 mr-2"></i> 帳號管理
                </h2>
                <button onclick="openAccountEditModal()" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center">
                    <i class="ph ph-plus mr-1"></i> 新增帳號
                </button>
            </div>
            
            <div class="bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">帳號 (Username)</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userListBody" class="bg-white divide-y divide-gray-200">
                        <!-- 帳號列表動態生成 -->
                    </tbody>
                </table>
                <div id="userLoadingIndicator" class="hidden flex justify-center items-center py-6">
                    <i class="ph ph-spinner animate-spin text-2xl text-indigo-500"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 6. 新增/編輯帳號視窗 -->
    <div id="accountEditModal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 relative">
            <h2 id="accountEditModalTitle" class="text-xl font-bold text-gray-800 mb-4">新增帳號</h2>
            <form id="accountForm" onsubmit="saveUser(event)" class="space-y-4">
                <input type="hidden" id="editUserId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">帳號名稱 <span class="text-red-500">*</span></label>
                    <input type="text" id="editUsername" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">登入密碼 <span class="text-red-500">*</span></label>
                    <input type="password" id="editPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="設定密碼">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button type="button" onclick="closeModal('accountEditModal')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md transition-colors">取消</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md transition-colors">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 4. 吐司通知 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg pointer-events-none">
        <i id="toastIcon" class="ph-fill ph-check-circle text-green-400 text-xl mr-3"></i>
        <span id="toastMessage" class="font-medium">操作成功</span>
    </div>

    <!-- ================= JavaScript 邏輯 ================= -->
    <script>
        /**
         * 系統設定
         * MOCK_MODE: 設為 true 時，資料只存在瀏覽器記憶體中 (測試用)。
         * 部署時，請將 GAS_API_URL 替換為您的 Google Apps Script 發布網址，並將 MOCK_MODE 設為 false。
         */
        const MOCK_MODE = false; 
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwTXCn1xvuOlLihKunO68lAmAOroa-cdP2nKD6mmstgYxb3r90srC1Twd5S0R_nrkewIw/exec"; 

        // 狀態與分頁變數
        let isAdmin = false;
        let usersData = [];
        let photosData = [];
        
        let currentPage = 1;
        const itemsPerPage = 8; // 設定每頁顯示 8 筆
        let searchQuery = '';

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        // ================= 資料處理與渲染 =================

        // 取得資料
        async function fetchData() {
            showLoading(true);
            if (MOCK_MODE) {
                setTimeout(() => { renderGallery(); showLoading(false); }, 500);
            } else {
                try {
                    const response = await fetch(GAS_API_URL + "?action=get", { redirect: "follow" });
                    const textResult = await response.text();
                    
                    try {
                        const result = JSON.parse(textResult);
                        if (result.status === 'success') {
                            photosData = result.data || [];
                            renderGallery();
                        } else {
                            showToast("讀取資料失敗: " + (result.message || ""), "error");
                        }
                    } catch (e) {
                        console.error("解析 JSON 失敗，收到的內容:", textResult);
                        if (textResult.includes("<html") || textResult.includes("Sign in")) {
                            showToast("權限錯誤：被教育帳號擋下，請確認 GAS 發布為「所有人」", "error");
                        } else {
                            showToast("API 格式錯誤 (請確認部署權限為所有人)", "error");
                        }
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    showToast("網路連線錯誤或 CORS 阻擋", "error");
                } finally {
                    showLoading(false);
                }
            }
        }

        // 轉換 Google Drive 連結為可顯示的圖片連結 (使用 thumbnail API)
        function formatImageUrl(url) {
            if (!url) return '';
            const driveRegex = /(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=)([-a-zA-Z0-9_]+)/;
            const match = url.match(driveRegex);
            
            if (match && match[1]) {
                return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            }
            return url; 
        }

        // 搜尋功能
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            currentPage = 1; // 重新搜尋時跳回第一頁
            renderGallery();
        }

        // 切換頁面
        function changePage(page) {
            currentPage = page;
            renderGallery();
            // 切換分頁後自動平滑捲動到上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 渲染分頁按鈕
        function renderPagination(totalItems, totalPages) {
            const controls = document.getElementById('paginationControls');
            const container = document.getElementById('paginationContainer');
            controls.innerHTML = '';

            if (totalPages <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            // 上一頁按鈕
            const prevBtn = document.createElement('button');
            prevBtn.onclick = () => changePage(currentPage - 1);
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = `relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium ${currentPage === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50 transition-colors'}`;
            prevBtn.innerHTML = '<i class="ph ph-caret-left"></i>';
            controls.appendChild(prevBtn);

            // 頁碼滑動視窗計算
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            if (currentPage <= 2) endPage = Math.min(totalPages, 5);
            if (currentPage >= totalPages - 1) startPage = Math.max(1, totalPages - 4);

            if (startPage > 1) {
                controls.appendChild(createPageBtn(1));
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.className = "relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700";
                    dots.innerText = "...";
                    controls.appendChild(dots);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                controls.appendChild(createPageBtn(i));
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const dots = document.createElement('span');
                    dots.className = "relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700";
                    dots.innerText = "...";
                    controls.appendChild(dots);
                }
                controls.appendChild(createPageBtn(totalPages));
            }

            // 下一頁按鈕
            const nextBtn = document.createElement('button');
            nextBtn.onclick = () => changePage(currentPage + 1);
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.className = `relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium ${currentPage === totalPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-500 hover:bg-gray-50 transition-colors'}`;
            nextBtn.innerHTML = '<i class="ph ph-caret-right"></i>';
            controls.appendChild(nextBtn);
        }

        // 建立單一頁碼按鈕元件
        function createPageBtn(page) {
            const btn = document.createElement('button');
            btn.onclick = () => changePage(page);
            if (page === currentPage) {
                btn.className = "z-10 bg-blue-50 border-blue-500 text-blue-600 relative inline-flex items-center px-4 py-2 border text-sm font-medium";
            } else {
                btn.className = "bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium transition-colors";
            }
            btn.innerText = page;
            return btn;
        }

        // 渲染畫廊
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');
            const emptyStateText = document.getElementById('emptyStateText');
            grid.innerHTML = '';

            // 1. 關鍵字搜尋過濾
            let filteredData = photosData;
            if (searchQuery) {
                filteredData = photosData.filter(photo => 
                    (photo.title && photo.title.toLowerCase().includes(searchQuery)) || 
                    (photo.desc && photo.desc.toLowerCase().includes(searchQuery))
                );
            }

            if (filteredData.length === 0) {
                emptyStateText.innerText = searchQuery ? "找不到符合關鍵字的相簿喔！" : "目前還沒有任何照片喔！";
                emptyState.classList.remove('hidden');
                document.getElementById('paginationContainer').classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                // 2. 依照日期新到舊排序
                const sortedData = [...filteredData].sort((a, b) => new Date(b.date) - new Date(a.date));

                // 3. 分頁切割處理
                const totalItems = sortedData.length;
                const totalPages = Math.ceil(totalItems / itemsPerPage);
                
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                const paginatedData = sortedData.slice(startIndex, endIndex);

                // 4. 產生目前頁面的卡片
                paginatedData.forEach(photo => {
                    let targetUrl = photo.url;
                    let thumbUrl = photo.url;
                    if (photo.url && photo.url.includes("|||")) {
                        const parts = photo.url.split("|||");
                        targetUrl = parts[0];
                        thumbUrl = parts[1];
                    }

                    const displayUrl = formatImageUrl(thumbUrl);
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow relative group flex flex-col";
                    
                    let adminButtons = '';
                    if (isAdmin) {
                        adminButtons = `
                            <div class="absolute top-2 right-2 flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                                <button onclick="editPhoto('${photo.id}')" class="bg-white text-blue-600 p-2 rounded-full shadow hover:bg-blue-50 transition-colors" title="編輯">
                                    <i class="ph ph-pencil-simple text-lg"></i>
                                </button>
                                <button onclick="promptDelete('${photo.id}', 'photo')" class="bg-white text-red-600 p-2 rounded-full shadow hover:bg-red-50 transition-colors" title="刪除">
                                    <i class="ph ph-trash text-lg"></i>
                                </button>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        ${adminButtons}
                        <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" onclick="recordView('${photo.id}')" class="flex-grow flex flex-col group/link relative z-10">
                            <div class="image-container relative w-full pt-[66.66%] bg-gray-200">
                                <img src="${displayUrl}" alt="${photo.title}" 
                                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCA4MDAgNjAwIiBwcmVzZXJ2ZUFzcGVjdFJhdGlvPSJub25lIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjNmNGY2Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyNCIgZmlsbD0iI2EwYTBhMCIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+5ZyW54mH54Sh5rOV6aGv56S6PC90ZXh0Pjwvc3ZnPg==';" 
                                     class="absolute top-0 left-0 w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover/link:bg-opacity-30 transition-all duration-300 flex items-center justify-center">
                                    <div class="bg-white/90 text-gray-800 px-4 py-2 rounded-full font-medium opacity-0 group-hover/link:opacity-100 transform translate-y-4 group-hover/link:translate-y-0 transition-all duration-300 flex items-center shadow-lg">
                                        <i class="ph-bold ph-arrow-square-out mr-2"></i> 前往相簿
                                    </div>
                                </div>
                            </div>
                            <div class="p-4 flex-grow flex flex-col">
                                <h3 class="font-bold text-lg text-gray-800 line-clamp-1 group-hover/link:text-blue-600 transition-colors">${photo.title}</h3>
                                <p class="text-sm text-gray-500 mb-2 flex items-center mt-1">
                                    <i class="ph ph-calendar-blank mr-1"></i> ${photo.date}
                                </p>
                                <div class="flex justify-between items-end mt-auto pt-2">
                                    <p class="text-gray-600 text-sm line-clamp-2 pr-2">${photo.desc || '無說明'}</p>
                                    <div class="flex items-center text-gray-400 text-xs shrink-0 bg-gray-50 px-2 py-1 rounded-md" title="瀏覽人次">
                                        <i class="ph-fill ph-eye mr-1 text-gray-400"></i>
                                        <span id="view-count-${photo.id}" class="font-medium text-gray-500">${photo.views || 0}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });

                // 5. 渲染下方分頁控制列
                renderPagination(totalItems, totalPages);
            }
        }

        // ================= 權限管理 =================

        function toggleAuth() {
            if (isAdmin) {
                isAdmin = false;
                updateAuthUI();
                showToast("已登出管理員身分", "success");
            } else {
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginModal').classList.remove('hidden');
                setTimeout(() => document.getElementById('loginUsername').focus(), 100);
            }
        }

        async function checkLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');
            
            if (!username || !password) {
                showToast("請輸入帳號與密碼", "error");
                return;
            }

            btnText.innerText = "驗證中...";
            spinner.classList.remove('hidden');

            if (MOCK_MODE) {
                setTimeout(() => {
                    if (username === 'admin' && password === 'admin123') { 
                        isAdmin = true;
                        closeModal('loginModal');
                        updateAuthUI();
                        showToast("登入成功", "success");
                    } else {
                        showToast("帳號或密碼錯誤", "error");
                    }
                    btnText.innerText = "登入";
                    spinner.classList.add('hidden');
                }, 500);
            } else {
                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'login', username, password })
                    });
                    
                    const textResult = await response.text();
                    const result = JSON.parse(textResult);
                    if (result.status === 'success') {
                        isAdmin = true;
                        closeModal('loginModal');
                        updateAuthUI();
                        showToast(result.message || "登入成功", "success");
                    } else {
                        showToast(result.message || "帳號或密碼錯誤", "error");
                    }
                } catch (error) {
                    console.error("Login error:", error);
                    showToast("網路錯誤或格式異常，請確認 API", "error");
                } finally {
                    btnText.innerText = "登入";
                    spinner.classList.add('hidden');
                }
            }
        }

        function updateAuthUI() {
            const authText = document.getElementById('authText');
            const authIcon = document.getElementById('authIcon');
            const adminToolbar = document.getElementById('adminToolbar');

            if (isAdmin) {
                authText.innerText = "登出管理員";
                authIcon.className = "ph ph-sign-out text-lg text-red-500";
                adminToolbar.classList.remove('hidden');
            } else {
                authText.innerText = "管理員登入";
                authIcon.className = "ph ph-user text-lg text-gray-600";
                adminToolbar.classList.add('hidden');
            }
            renderGallery();
        }

        // ================= 相簿 CRUD 操作 =================
        
        function openPhotoModal() {
            document.getElementById('photoForm').reset();
            document.getElementById('photoId').value = '';
            document.getElementById('photoModalTitle').innerText = '新增照片';
            document.getElementById('photoDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('photoModal').classList.remove('hidden');
        }

        function editPhoto(id) {
            const photo = photosData.find(p => p.id === id);
            if (!photo) return;

            let targetUrl = photo.url || '';
            let thumbUrl = photo.url || '';
            if (photo.url && photo.url.includes("|||")) {
                const parts = photo.url.split("|||");
                targetUrl = parts[0];
                thumbUrl = parts[1];
            }

            document.getElementById('photoId').value = photo.id;
            document.getElementById('photoTitle').value = photo.title;
            document.getElementById('photoUrl').value = targetUrl;
            document.getElementById('thumbnailUrl').value = thumbUrl;
            document.getElementById('photoDate').value = photo.date;
            document.getElementById('photoDesc').value = photo.desc;
            
            document.getElementById('photoModalTitle').innerText = '編輯照片';
            document.getElementById('photoModal').classList.remove('hidden');
        }

        async function savePhoto(event) {
            event.preventDefault();
            
            const id = document.getElementById('photoId').value;
            const combinedUrl = document.getElementById('photoUrl').value + "|||" + document.getElementById('thumbnailUrl').value;

            const payload = {
                title: document.getElementById('photoTitle').value,
                url: combinedUrl,
                date: document.getElementById('photoDate').value,
                desc: document.getElementById('photoDesc').value
            };

            showLoading(true);
            closeModal('photoModal');

            if (MOCK_MODE) {
                setTimeout(() => {
                    if (id) {
                        const index = photosData.findIndex(p => p.id === id);
                        if (index !== -1) photosData[index] = { ...payload, id };
                        showToast("相片已更新", "success");
                    } else {
                        const newId = Date.now().toString();
                        photosData.push({ ...payload, id: newId });
                        showToast("相片已新增", "success");
                    }
                    renderGallery();
                    showLoading(false);
                }, 500);
            } else {
                const action = id ? 'update' : 'create';
                if (id) payload.id = id;

                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8'
                        },
                        body: JSON.stringify({ action: action, data: payload })
                    });
                    
                    const textResult = await response.text();
                    try {
                        const result = JSON.parse(textResult);
                        if (result.status === 'success') {
                            showToast(id ? "更新成功" : "新增成功", "success");
                            fetchData(); 
                        } else {
                            showToast(result.message || "操作失敗", "error");
                            showLoading(false);
                        }
                    } catch(e) {
                         console.error("解析 JSON 失敗，收到的內容:", textResult);
                         showToast("API 回傳格式錯誤 (請確認部署權限)", "error");
                         showLoading(false);
                    }
                } catch (error) {
                    console.error("Save error:", error);
                    showToast("網路錯誤，請稍後再試", "error");
                    showLoading(false);
                }
            }
        }

        function promptDelete(id, type = 'photo') {
            document.getElementById('deleteId').value = id;
            document.getElementById('deleteType').value = type;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        async function confirmDelete() {
            const id = document.getElementById('deleteId').value;
            const type = document.getElementById('deleteType').value;
            const actionTarget = type === 'photo' ? 'delete' : 'delete_user';
            
            closeModal('deleteModal');
            
            if (type === 'photo') showLoading(true);
            else document.getElementById('userLoadingIndicator').classList.remove('hidden');

            if (MOCK_MODE) {
                setTimeout(() => {
                    if (type === 'photo') {
                        photosData = photosData.filter(p => p.id !== id);
                        renderGallery();
                        showLoading(false);
                        showToast("照片已刪除", "success");
                    } else {
                        usersData = usersData.filter(u => u.id !== id);
                        renderUsers();
                        document.getElementById('userLoadingIndicator').classList.add('hidden');
                        showToast("帳號已刪除", "success");
                    }
                }, 500);
            } else {
                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: actionTarget, id: id })
                    });
                    
                    const textResult = await response.text();
                    try {
                        const result = JSON.parse(textResult);
                        if (result.status === 'success') {
                            showToast("刪除成功", "success");
                            if (type === 'photo') fetchData();
                            else fetchUsers();
                        } else {
                            showToast(result.message || "刪除失敗", "error");
                            if (type === 'photo') showLoading(false);
                            else document.getElementById('userLoadingIndicator').classList.add('hidden');
                        }
                    } catch (e) {
                         console.error("解析 JSON 失敗，收到的內容:", textResult);
                         showToast("API 回傳格式錯誤", "error");
                         showLoading(false);
                    }
                } catch (error) {
                    console.error("Delete error:", error);
                    showToast("網路錯誤", "error");
                    showLoading(false);
                }
            }
        }

        // ================= 帳號管理 CRUD =================

        async function fetchUsers() {
            if (!isAdmin) return;
            const loader = document.getElementById('userLoadingIndicator');
            const tbody = document.getElementById('userListBody');
            
            loader.classList.remove('hidden');
            tbody.innerHTML = '';

            if (MOCK_MODE) {
                setTimeout(() => {
                    if (usersData.length === 0) usersData = [{id: '1', username: 'admin', password: 'admin123'}];
                    renderUsers();
                    loader.classList.add('hidden');
                }, 500);
            } else {
                try {
                    const response = await fetch(GAS_API_URL + "?action=get_users", { redirect: "follow" });
                    const textResult = await response.text();
                    const result = JSON.parse(textResult);
                    if (result.status === 'success') {
                        usersData = result.data || [];
                        renderUsers();
                    } else {
                        showToast("讀取帳號失敗", "error");
                    }
                } catch (error) {
                    console.error("Error fetching users:", error);
                    showToast("網路連線錯誤", "error");
                } finally {
                    loader.classList.add('hidden');
                }
            }
        }

        function renderUsers() {
            const tbody = document.getElementById('userListBody');
            tbody.innerHTML = '';
            
            if (usersData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="2" class="px-4 py-4 text-center text-sm text-gray-500">目前沒有其他帳號紀錄</td></tr>`;
                return;
            }

            usersData.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${user.username}</td>
                    <td class="px-4 py-3 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editUser('${user.id}')" class="text-indigo-600 hover:text-indigo-900 mr-3">編輯密碼</button>
                        <button onclick="promptDelete('${user.id}', 'user')" class="text-red-600 hover:text-red-900">刪除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openAccountListModal() {
            document.getElementById('accountListModal').classList.remove('hidden');
            fetchUsers();
        }

        function openAccountEditModal() {
            document.getElementById('accountForm').reset();
            document.getElementById('editUserId').value = '';
            document.getElementById('accountEditModalTitle').innerText = '新增帳號';
            document.getElementById('accountEditModal').classList.remove('hidden');
        }

        function editUser(id) {
            const user = usersData.find(u => u.id === id);
            if (!user) return;
            
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editPassword').value = user.password;
            
            document.getElementById('accountEditModalTitle').innerText = '編輯帳號/密碼';
            document.getElementById('accountEditModal').classList.remove('hidden');
        }

        async function saveUser(event) {
            event.preventDefault();
            
            const id = document.getElementById('editUserId').value;
            const payload = {
                username: document.getElementById('editUsername').value,
                password: document.getElementById('editPassword').value
            };

            document.getElementById('userLoadingIndicator').classList.remove('hidden');
            closeModal('accountEditModal');

            if (MOCK_MODE) {
                setTimeout(() => {
                    if (id) {
                        const index = usersData.findIndex(u => u.id === id);
                        if (index !== -1) usersData[index] = { ...payload, id };
                        showToast("帳號已更新", "success");
                    } else {
                        usersData.push({ ...payload, id: Date.now().toString() });
                        showToast("帳號已新增", "success");
                    }
                    renderUsers();
                    document.getElementById('userLoadingIndicator').classList.add('hidden');
                }, 500);
            } else {
                const action = id ? 'update_user' : 'create_user';
                if (id) payload.id = id;

                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: action, data: payload })
                    });
                    
                    const textResult = await response.text();
                    const result = JSON.parse(textResult);
                    if (result.status === 'success') {
                        showToast(id ? "帳號更新成功" : "帳號新增成功", "success");
                        fetchUsers(); 
                    } else {
                        showToast(result.message || "操作失敗", "error");
                        document.getElementById('userLoadingIndicator').classList.add('hidden');
                    }
                } catch (error) {
                    console.error("Save user error:", error);
                    showToast("網路錯誤", "error");
                    document.getElementById('userLoadingIndicator').classList.add('hidden');
                }
            }
        }

        // ================= 工具函數 =================

        function recordView(id) {
            // 1. 樂觀 UI 更新：點擊瞬間先在畫面上 +1 (讓使用者感覺反應很快)
            const photo = photosData.find(p => p.id === id);
            if (photo) {
                photo.views = (parseInt(photo.views) || 0) + 1;
                const viewCountEl = document.getElementById(`view-count-${id}`);
                if (viewCountEl) {
                    viewCountEl.innerText = photo.views;
                }
            }

            // 2. 在背景發送請求給後端記錄次數，不阻擋換頁
            if (!MOCK_MODE) {
                fetch(GAS_API_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'increment_view', id: id })
                }).catch(e => console.error("Failed to increment view", e));
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        function showLoading(show) {
            const loader = document.getElementById('loadingIndicator');
            const grid = document.getElementById('galleryGrid');
            if (show) {
                loader.classList.remove('hidden');
                grid.style.opacity = '0.3';
            } else {
                loader.classList.add('hidden');
                grid.style.opacity = '1';
            }
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMessage').innerText = message;

            if (type === 'success') {
                icon.className = "ph-fill ph-check-circle text-green-400 text-xl mr-3";
            } else if (type === 'error') {
                icon.className = "ph-fill ph-warning-circle text-red-400 text-xl mr-3";
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

    </script>
</body>
</html>
